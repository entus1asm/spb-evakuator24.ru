<section class="contacts-cta" id="contacts" aria-labelledby="contacts-cta-title">
	<div class="container">
		<div class="contacts-cta__inner">
			<div class="contacts-cta__content">
				<h2 class="contacts-cta__title" id="contacts-cta-title">
					<span class="contacts-cta__title-line">Нужна помощь?</span>
					<span class="contacts-cta__title-line contacts-cta__title-line--accent">Мы на связи 24/7</span>
				</h2>

				<ul class="contacts-cta__list">
					<li class="contacts-cta__item">
						<div class="contacts-cta__item-icon-box" aria-hidden="true">
							<img class="contacts-cta__item-icon" src="./img/contacts-cta/contacts-cta-phone-icon.svg" alt="" />
						</div>

						<div class="contacts-cta__item-body">
							<p class="contacts-cta__item-label">Прямой номер (24/7)</p>
							<a class="contacts-cta__item-link" href="tel:+79052003333">8 (905) 200-33-33</a>
						</div>
					</li>

					<li class="contacts-cta__item">
						<div class="contacts-cta__item-icon-box" aria-hidden="true">
							<img class="contacts-cta__item-icon" src="./img/contacts-cta/contacts-cta-location-icon.svg" alt="" />
						</div>

						<div class="contacts-cta__item-body">
							<p class="contacts-cta__item-label">Район работы</p>
							<p class="contacts-cta__item-text">СПб, Ленинградская обл., Межгород</p>
						</div>
					</li>
				</ul>
			</div>

			<div class="contacts-cta__form-box">
				<form class="contacts-cta__form" id="request-form" action="#!" method="post">
					<h3 class="contacts-cta__form-title">Заказать обратный звонок</h3>

					<div class="contacts-cta__field">
						<label class="contacts-cta__label" for="contacts-cta-phone">Ваш телефон</label>
						<input class="contacts-cta__input" id="contacts-cta-phone" name="phone" type="tel" inputmode="tel"
							autocomplete="tel" placeholder="+7 (___) ___-__-__" required />
					</div>

					<div class="contacts-cta__field">
						<label class="contacts-cta__label" for="contacts-cta-name">Как к вам обращаться?</label>
						<input class="contacts-cta__input" id="contacts-cta-name" name="name" type="text" autocomplete="name"
							placeholder="Ваше имя" required />
					</div>

					<button class="contacts-cta__button" type="submit">
						<img class="contacts-cta__button-icon" src="./img/contacts-cta/contacts-cta-button-icon.svg" alt="" aria-hidden="true" />
						<span class="contacts-cta__button-text">Перезвоните мне</span>
					</button>

					<ul class="contacts-cta__messengers" aria-label="Мессенджеры для связи">
						<li class="contacts-cta__messengers-item">
							<a class="contacts-cta__messengers-link" href="#!">WhatsApp</a>
						</li>
						<li class="contacts-cta__messengers-item">
							<a class="contacts-cta__messengers-link" href="#!">Max</a>
						</li>
						<li class="contacts-cta__messengers-item">
							<a class="contacts-cta__messengers-link" href="#!">Telegram</a>
						</li>
					</ul>
				</form>
			</div>
		</div>
	</div>
</section>
