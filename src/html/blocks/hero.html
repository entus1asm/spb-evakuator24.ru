<section class="hero" aria-labelledby="hero-title">
	<div class="hero__container container">
		<div class="hero__inner">
			<div class="hero__content">
				<p class="hero__badge">
					<span class="hero__badge-indicator" aria-hidden="true"></span>
					<span class="hero__badge-text">Работаю лично 24/7 • СПб, ЛО, межгород</span>
				</p>

				<h1 class="hero__title" id="hero-title">
					<span class="hero__title-line">Эвакуатор в СПб</span>
					<span class="hero__title-line hero__title-line--accent">за 20 минут</span>
				</h1>

				<div class="hero__description">
					<p class="hero__description-text">
						Частный эвакуатор без посредников. Перевозка авто до 5 тонн, работа любой сложности.
					</p>
				</div>

				<div class="hero__actions" aria-label="Основные действия">
					<a
						class="hero__action hero__action--primary"
						href="tel:+79052003333"
						aria-label="Вызвать эвакуатор по телефону 8 905 200 33 33"
					>
						<img
							class="hero__action-icon"
							src="./img/hero/phone-icon.svg"
							width="24"
							height="24"
							alt=""
							aria-hidden="true"
						/>
						<span class="hero__action-text">Вызвать сейчас</span>
					</a>
					<a class="hero__action hero__action--secondary" href="#request-form">
						<img
							class="hero__action-icon"
							src="./img/hero/request-form-icon.svg"
							width="24"
							height="24"
							alt=""
							aria-hidden="true"
						/>
						<span class="hero__action-text">Оставить заявку</span>
					</a>
				</div>

				<ul class="hero__benefits" aria-label="Преимущества">
					<li class="hero__benefit">
						<img
							class="hero__benefit-icon"
							src="./img/hero/time-experiance-icon.svg"
							width="18"
							height="18"
							alt=""
							aria-hidden="true"
						/>
						<span class="hero__benefit-text">10 лет опыта</span>
					</li>
					<li class="hero__benefit">
						<img
							class="hero__benefit-icon"
							src="./img/hero/time-icon.svg"
							width="18"
							height="18"
							alt=""
							aria-hidden="true"
						/>
						<span class="hero__benefit-text">Подача ~20 мин</span>
					</li>
				</ul>
			</div>

			<div class="hero__media">
				<figure class="hero__map">
					<div class="hero__map-picture">
						<iframe
							class="hero__map-frame"
							src="https://yandex.ru/map-widget/v1/-/CPvVbUMy?lang=ru_RU"
							width="592"
							height="600"
							frameborder="0"
							allowfullscreen="true"
							loading="lazy"
							title="Карта района обслуживания эвакуатора"
						></iframe>
					</div>

					<figcaption class="hero__map-summary">
						<p class="hero__map-summary-text">Более 100+ положительных отзывов.</p>

						<div class="hero__map-summary-row">
							<div class="hero__map-rating" aria-label="Рейтинг 4,8 из 5">
								<span class="hero__map-rating-value">4,8</span>
								<span class="hero__map-rating-stars" aria-hidden="true">★★★★★</span>
							</div>

							<ul class="hero__map-platforms" aria-label="Площадки с отзывами">
								<li class="hero__map-platform">
									<img src="./img/hero/yandex-map-icon.svg" alt="Иконка Яндекс Карт" />
								</li>
								<li class="hero__map-platform">
									<img src="./img/hero/avito-app-icon.svg" alt="Иконка Авито" />
								</li>
							</ul>
						</div>
					</figcaption>
				</figure>
			</div>
		</div>
	</div>
</section>
