<header class="header" itemscope itemtype="https://schema.org/LocalBusiness">
	<div class="container">
		<div class="header__row">
			<a
				class="header__logo logo"
				href="./index.html"
				aria-label="Эвакуатор 24 часа — главная страница"
				itemprop="url"
			>
				<img
					class="logo__mark"
					src="./img/header/header-icon.svg"
					width="28"
					height="28"
					alt=""
					aria-hidden="true"
				/>
				<span class="logo__text" itemprop="name">Эвакуатор 24 часа</span>
			</a>

			<nav class="header__nav nav" aria-label="Основная навигация">
				<ul class="nav__list">
					<li class="nav__item"><a href="./index.html#services" class="nav__link">Услуги</a></li>
					<li class="nav__item"><a href="./index.html#rates" class="nav__link">Тарифы</a></li>
					<li class="nav__item"><a href="./index.html#coverage" class="nav__link">Районы</a></li>
					<li class="nav__item"><a href="./index.html#reviews" class="nav__link">Отзывы</a></li>
					<li class="nav__item"><a href="./index.html#faq" class="nav__link">Вопросы</a></li>
					<li class="nav__item"><a href="./index.html#contacts" class="nav__link">Контакты</a></li>
				</ul>
			</nav>

			<div class="header__contacts">
				<address class="header__address">
					<a
						class="header__phone"
						href="tel:+79052003333"
						aria-label="Позвонить в службу эвакуации 8 905 200 33 33"
						itemprop="telephone"
					>
						8 (905) 200-33-33
					</a>
				</address>

				<a
					class="header__button"
					href="./index.html#request-form"
					aria-label="Перейти к форме заявки на эвакуатор"
				>
					Вызвать эвакуатор
				</a>
			</div>

			<div class="header__mobile-contacts" aria-label="Быстрые контакты">
				<a
					class="header__mobile-button"
					href="./index.html#request-form"
					aria-label="Перейти к форме заявки на эвакуатор"
				>
					<span class="header__mobile-button-text header__mobile-button-text--full">Вызвать эвакуатор</span>
					<span class="header__mobile-button-text header__mobile-button-text--short">Вызов</span>
				</a>
			</div>

			<button
				class="mobile-nav-btn"
				type="button"
				aria-label="Открыть мобильное меню"
				aria-expanded="false"
				aria-controls="mobile-nav"
			>
				<div class="nav-icon"></div>
			</button>
		</div>
	</div>
</header>
@@include('mobile-nav.html')
